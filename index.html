<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxima - Productivity Hub</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- App Container -->
    <div id="app" class="app-container">
        
        <!-- Login Screen -->
        <section id="login-screen" class="screen active">
            <div class="login-wrapper">
                <div class="login-card glass-panel">
                    <div class="brand">
                        <i class="fa-solid fa-layer-group brand-icon"></i>
                        <h1>Proxima</h1>
                    </div>
                    <p class="subtitle">Welcome to your productivity hub</p>
                    
                    <form id="login-form">
                        <div class="input-group">
                            <label for="username">Username</label>
                            <div class="input-with-icon">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="username" placeholder="e.g. user1" required autocomplete="username">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="input-with-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" placeholder="e.g. pass1" required autocomplete="current-password">
                            </div>
                        </div>
                        <div class="error-msg" id="login-error">Invalid credentials</div>
                        <button type="submit" class="btn-primary login-btn">
                            Sign In <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                    
                    <div class="login-hint">
                        <p>Demo Accounts:</p>
                        <ul>
                            <li>user1 / pass1</li>
                            <li>user2 / pass2</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dashboard Screen -->
        <section id="dashboard-screen" class="screen">
            <!-- Sidebar for Todos -->
            <aside class="sidebar glass-panel-dark">
                <div class="sidebar-header">
                    <div class="brand">
                        <i class="fa-solid fa-layer-group brand-icon"></i>
                        <h2>Proxima</h2>
                    </div>
                    <button id="mobile-menu-btn" class="icon-btn mobile-only"><i class="fa-solid fa-bars"></i></button>
                </div>
                
                <div class="todo-section">
                    <div class="section-title">
                        <h3><i class="fa-solid fa-check-square"></i> Tasks</h3>
                        <span id="task-count" class="badge">0</span>
                    </div>
                    
                    <form id="todo-form" class="add-item-form">
                        <input type="text" id="new-todo-input" placeholder="Add a new task..." required>
                        <button type="submit" class="icon-btn add-btn"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    
                    <ul id="todo-list" class="todo-list">
                        <!-- Todo items injected by JS -->
                    </ul>
                </div>
                
                <div class="user-profile">
                    <div class="avatar">
                        <span id="user-initial">U</span>
                    </div>
                    <div class="user-info">
                        <p id="current-username" class="username">user1</p>
                        <button id="logout-btn" class="logout-link">Sign Out</button>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area - Calendar -->
            <main class="main-content">
                <header class="top-header">
                    <div class="calendar-controls">
                        <button id="today-btn" class="btn-secondary">Today</button>
                        <div class="month-nav">
                            <button id="prev-month" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                            <button id="next-month" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                        <h2 id="current-month-year" class="month-title">January 2024</h2>
                    </div>
                    <div class="header-actions">
                        <button id="add-event-btn" class="btn-primary">
                            <i class="fa-solid fa-plus"></i> New Event
                        </button>
                    </div>
                </header>
                
                <div class="calendar-wrapper glass-panel">
                    <div class="calendar-weekdays">
                        <div>Sun</div>
                        <div>Mon</div>
                        <div>Tue</div>
                        <div>Wed</div>
                        <div>Thu</div>
                        <div>Fri</div>
                        <div>Sat</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Calendar cells injected by JS -->
                    </div>
                </div>
            </main>
        </section>
        
        <!-- Add Event Modal -->
        <div id="event-modal" class="modal-overlay hidden">
            <div class="modal glass-panel">
                <div class="modal-header">
                    <h3>Add Event</h3>
                    <button class="icon-btn close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <form id="event-form">
                    <div class="input-group">
                        <label for="event-title">Event Title</label>
                        <input type="text" id="event-title" required placeholder="Design Review">
                    </div>
                    <div class="form-row">
                        <div class="input-group half">
                            <label for="event-date">Date</label>
                            <input type="date" id="event-date" required>
                        </div>
                        <div class="input-group half">
                            <label for="event-time">Time</label>
                            <input type="time" id="event-time" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="event-color">Color Label</label>
                        <div class="color-picker" id="color-picker">
                            <div class="color-option" data-color="#3b82f6" style="background-color: #3b82f6;" title="Blue"></div>
                            <div class="color-option" data-color="#10b981" style="background-color: #10b981;" title="Green"></div>
                            <div class="color-option" data-color="#f59e0b" style="background-color: #f59e0b;" title="Yellow"></div>
                            <div class="color-option active" data-color="#ef4444" style="background-color: #ef4444;" title="Red"></div>
                            <div class="color-option" data-color="#8b5cf6" style="background-color: #8b5cf6;" title="Purple"></div>
                        </div>
                        <input type="hidden" id="event-color-value" value="#ef4444">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary close-modal-btn">Cancel</button>
                        <button type="submit" class="btn-primary">Save Event</button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
